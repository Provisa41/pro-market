services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    ports:
      - "${BOT_WEBHOOK_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      - server
