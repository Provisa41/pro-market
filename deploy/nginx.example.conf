# Example: single domain for Mini App + bot webhook
# WEBHOOK_BASE_URL=https://your-domain.example.com
# WEBAPP_URL=https://your-domain.example.com
# Bot container listens on bot:8080, server on server:3000

server {
    listen 443 ssl;
    server_name your-domain.example.com;

    location /webhook/bot {
        proxy_pass http://bot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
